name: C/C++ CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: installing dependency
      run : |
        sudo apt install libwxsqlite3-3.0-dev libwxsqlite3-3.0-dev libwxgtk-webview3.0-gtk3-dev\
              libwxgtk-media3.0-dev libwxbase3.0-dev autotools-dev
    - name : install automake
      run : |
        wget http://ftp.gnu.org/gnu/automake/automake-1.16.tar.gz
        tar xvfz automake-1.16.tar.gz
        cd automake-1.16
        ./configure
        make
        make install
        cd ..
    - name: configure
      run: ./configure
    - name: make
      run: make
    - name: make check
      run: make check
    - name: make distcheck
      run: make distcheck
